<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>ElevateCV</title>

<link rel="icon" type="image/png" href="logo.png">

<!-- Inter Font -->
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/4.2.67/pdf.min.js"></script>

<script>
if (window.pdfjsLib?.GlobalWorkerOptions) {
  pdfjsLib.GlobalWorkerOptions.workerSrc =
    "https://cdnjs.cloudflare.com/ajax/libs/pdf.js/4.2.67/pdf.worker.min.js";
}
</script>

<style>
:root{
  --bg1:#f8fafc; --bg2:#eef2ff;
  --card:#ffffff; --ink:#0f172a; --muted:#64748b;
  --line:#e5e7eb;
  --accent1:#2563EB; --accent2:#7C3AED;
  --shadow:0 15px 40px rgba(0,0,0,0.08);
  --r:18px;
}

*{ box-sizing:border-box; -webkit-font-smoothing:antialiased; -moz-osx-font-smoothing:grayscale; }

body{
  font-family:'Inter', sans-serif;
  margin:0;
  background:linear-gradient(135deg,var(--bg1),var(--bg2));
  color:var(--ink);
}

button,input,textarea{ font-family:'Inter', sans-serif; }

.container{ max-width:1100px; margin:auto; padding:40px 20px; }

.hero{ text-align:center; margin-bottom:22px; }
.hero img{ max-width:320px; width:100%; margin-bottom:10px; }
.hero p{ font-size:16px; font-weight:700; color:var(--muted); }

.grid{ display:grid; grid-template-columns:420px 1fr; gap:18px; }
@media(max-width:980px){ .grid{ grid-template-columns:1fr; } }

.card{
  background:var(--card);
  padding:22px;
  border-radius:var(--r);
  box-shadow:var(--shadow);
  border:1px solid rgba(0,0,0,0.03);
}

.label{ font-size:12px; font-weight:900; color:var(--muted); margin-bottom:8px; }

input,textarea{
  width:100%;
  padding:12px;
  border-radius:12px;
  border:1px solid var(--line);
  margin-bottom:12px;
}

textarea{ min-height:110px; }

.btn{
  padding:12px 16px;
  border:none;
  border-radius:12px;
  font-weight:900;
  cursor:pointer;
  background:linear-gradient(90deg,var(--accent1),var(--accent2));
  color:white;
}
.btn.secondary{
  background:#f1f5f9;
  color:var(--ink);
  border:1px solid var(--line);
}

iframe{ width:100%; height:820px; border:none; background:white; }

.inline-alert{
  display:none;
  margin-top:10px;
  padding:10px;
  border-radius:12px;
  border:1px solid rgba(239,68,68,0.25);
  background:rgba(239,68,68,0.07);
  color:#991b1b;
  font-weight:900;
}

</style>
</head>

<body>
<div class="container">

<div class="hero">
  <img src="logo.png">
  <p>Transform Your Resume Into A Stunning Portfolio</p>
</div>

<div class="grid">

<div class="card">
  <p class="label">Resume (PDF or TXT)</p>
  <input type="file" id="file" accept=".pdf,.txt">

  <p class="label">Target Role (optional)</p>
  <input type="text" id="role">

  <p class="label">Notes (optional)</p>
  <textarea id="notes"></textarea>

  <button class="btn" onclick="generate()">Generate</button>
  <button class="btn secondary" onclick="downloadHTML()">Download HTML</button>
  <button class="btn secondary" onclick="downloadPDF()">Download PDF</button>

  <div class="inline-alert" id="alert"></div>
</div>

<div class="card">
  <iframe id="preview"></iframe>
</div>

</div>
</div>

<script>
let generatedHTML="";

function showAlert(msg){
  const a=document.getElementById("alert");
  a.style.display="block";
  a.textContent=msg;
}

function showPreview(html){
  document.getElementById("preview").srcdoc=html;
}

async function generate(){
  const file=document.getElementById("file").files[0];
  if(!file){ showAlert("Upload resume first."); return; }

  let text="";
  if(file.type==="text/plain"){
    text=await file.text();
  } else {
    const buffer=await file.arrayBuffer();
    const pdf=await pdfjsLib.getDocument({data:buffer}).promise;
    const page=await pdf.getPage(1);
    const content=await page.getTextContent();
    text=content.items.map(i=>i.str).join(" ");
  }

  const res=await fetch("/api/generate",{
    method:"POST",
    headers:{ "Content-Type":"application/json" },
    body:JSON.stringify({
      resumeText:text,
      role:document.getElementById("role").value,
      notes:document.getElementById("notes").value
    })
  });

  const data=await res.json();
  if(!res.ok){ showAlert(data.error||"Error"); return; }

  generatedHTML=renderPortfolio(data.data);
  showPreview(generatedHTML);
}

function renderPortfolio(d){
return `
<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
body{ font-family:'Inter',sans-serif; margin:0; }
.top{ background:#111827; padding:24px; color:white; text-align:center; }
.name{ font-size:32px; font-weight:900; }
.section{ padding:18px; border-bottom:1px solid #e5e7eb; }
h2{ font-size:13px; text-transform:uppercase; letter-spacing:0.15em; }
p{ line-height:1.6; font-size:14px; }
</style>
</head>
<body>
<div class="top">
<div class="name">${d.name||""}</div>
<div>${d.title||""}</div>
</div>
<div class="section"><h2>Summary</h2><p>${d.summary||""}</p></div>
</body>
</html>
`;
}

function downloadHTML(){
  if(!generatedHTML) return;
  const blob=new Blob([generatedHTML],{type:"text/html"});
  const a=document.createElement("a");
  a.href=URL.createObjectURL(blob);
  a.download="portfolio.html";
  a.click();
}

/* ==== FIXED PDF EXPORT (NO MIXED FONTS) ==== */
async function downloadPDF(){
  if(!generatedHTML){ showAlert("Generate first."); return; }

  const iframe=document.createElement("iframe");
  iframe.style.position="fixed";
  iframe.style.left="-9999px";
  document.body.appendChild(iframe);

  const idoc=iframe.contentDocument;
  idoc.open();
  idoc.write(generatedHTML);
  idoc.close();

  await new Promise(r=>setTimeout(r,600));
  if(idoc.fonts) await idoc.fonts.ready;
  await new Promise(r=>setTimeout(r,200));

  const style=idoc.createElement("style");
  style.textContent=`
    *{ font-family:'Inter',sans-serif !important; }
    @page{ margin:10mm; }
  `;
  idoc.head.appendChild(style);

  await html2pdf().from(idoc.body).set({
    filename:"portfolio.pdf",
    html2canvas:{scale:2},
    jsPDF:{unit:"mm",format:"a4",orientation:"portrait"}
  }).save();

  iframe.remove();
}
</script>

</body>
</html>
