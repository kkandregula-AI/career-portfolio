<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>PortfolioAI Pro</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

<style>
body{
  font-family:Inter,system-ui;
  margin:0;
  background:linear-gradient(135deg,#f8fafc,#eef2ff);
  transition:.3s;
}

.dark{
  background:#0f172a;
  color:white;
}

.container{
  max-width:1200px;
  margin:auto;
  padding:40px 20px;
}

.hero{
  margin-bottom:40px;
}

.hero h1{
  font-size:42px;
  margin:0;
}

.hero span{
  background:linear-gradient(90deg,#6366f1,#9333ea);
  -webkit-background-clip:text;
  color:transparent;
}

.card{
  background:white;
  padding:30px;
  border-radius:20px;
  box-shadow:0 15px 50px rgba(0,0,0,0.08);
  margin-bottom:25px;
  transition:.3s;
}

.dark .card{
  background:#1e293b;
}

input,textarea,select{
  width:100%;
  padding:12px;
  border-radius:12px;
  border:1px solid #e2e8f0;
  margin-bottom:15px;
}

button{
  padding:12px 18px;
  border:none;
  border-radius:12px;
  cursor:pointer;
  font-weight:600;
  margin-right:10px;
  background:linear-gradient(135deg,#6366f1,#8b5cf6);
  color:white;
}

button:hover{transform:scale(1.05)}

iframe{
  width:100%;
  height:600px;
  border:none;
  border-radius:16px;
  background:white;
}

.loader{
  display:none;
  margin-top:15px;
}

.spinner{
  width:30px;
  height:30px;
  border:4px solid #ddd;
  border-top:4px solid #6366f1;
  border-radius:50%;
  animation:spin 1s linear infinite;
}

@keyframes spin{
  to{transform:rotate(360deg)}
}
</style>
</head>

<body>

<div class="container">

<div class="hero">
<h1>Transform Your Resume Into <span>A Stunning Portfolio</span></h1>
<p>AI-powered, recruiter-ready website in seconds.</p>
</div>

<div class="card">

<input type="file" id="file" accept=".pdf,.doc,.docx,.txt">

<select id="template">
<option value="Modern Minimal">Modern Minimal</option>
<option value="Executive Blue">Executive Blue</option>
<option value="Academic Green">Academic Green</option>
</select>

<input type="text" id="role" placeholder="Target Role">
<textarea id="notes" placeholder="Additional notes"></textarea>

<button onclick="generate()">Generate</button>
<button onclick="downloadHTML()">Download HTML</button>
<button onclick="downloadPDF()">Download PDF</button>
<button onclick="toggleDark()">Dark Mode</button>

<div class="loader" id="loader">
<div style="display:flex;align-items:center;gap:10px;">
<div class="spinner"></div>
<span>Generating portfolio...</span>
</div>
</div>

</div>

<div class="card">
<iframe id="preview"></iframe>
</div>

</div>

<script>

let generatedHTML="";

function toggleDark(){
  document.body.classList.toggle("dark");
}

function toBase64(file){
  return new Promise((resolve,reject)=>{
    const reader=new FileReader();
    reader.readAsDataURL(file);
    reader.onload=()=>resolve(reader.result.split(',')[1]);
    reader.onerror=reject;
  });
}

async function generate(){
  const file=document.getElementById("file").files[0];
  if(!file){alert("Upload resume");return;}

  document.getElementById("loader").style.display="block";

  const base64=await toBase64(file);

  const response=await fetch("/api/generate",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({
      fileBase64:base64,
      mimeType:file.type,
      role:document.getElementById("role").value,
      notes:document.getElementById("notes").value,
      template:document.getElementById("template").value
    })
  });

  const data=await response.json();

  document.getElementById("loader").style.display="none";

  if(!response.ok){alert(data.error);return;}

  generatedHTML=data.text;
  document.getElementById("preview").srcdoc=generatedHTML;
}

function downloadHTML(){
  if(!generatedHTML){alert("Generate first");return;}
  const blob=new Blob([generatedHTML],{type:"text/html"});
  const a=document.createElement("a");
  a.href=URL.createObjectURL(blob);
  a.download="portfolio.html";
  a.click();
}

function downloadPDF(){
  if(!generatedHTML){alert("Generate first");return;}
  const element=document.getElementById("preview").contentDocument.body;
  html2pdf().from(element).save("portfolio.pdf");
}

</script>

</body>
</html>
