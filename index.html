<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>ElevateCV</title>

<link rel="icon" type="image/png" href="logo.png">
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

<style>
body{
  font-family:Inter,system-ui;
  margin:0;
  background:linear-gradient(135deg,#f8fafc,#eef2ff);
}

.container{
  max-width:1100px;
  margin:auto;
  padding:40px 20px;
}

.hero{
  text-align:center;
  margin-bottom:40px;
}

.hero img{
  max-width:320px;
  width:100%;
  margin-bottom:15px;
}

.hero p{
  font-size:16px;
  color:#64748b;
}

.card{
  background:white;
  padding:30px;
  border-radius:18px;
  box-shadow:0 15px 40px rgba(0,0,0,0.08);
  margin-bottom:25px;
}

input,textarea,select{
  width:100%;
  padding:12px;
  border-radius:12px;
  border:1px solid #e5e7eb;
  margin-bottom:15px;
}

button{
  padding:12px 18px;
  border:none;
  border-radius:10px;
  font-weight:600;
  margin-right:10px;
  background:linear-gradient(90deg,#2563EB,#7C3AED);
  color:white;
  cursor:pointer;
}

button:disabled{
  opacity:0.5;
  cursor:not-allowed;
}

iframe{
  width:100%;
  height:650px;
  border:none;
  border-radius:16px;
  background:white;
}

.loader{
  display:none;
  margin-top:15px;
}
</style>
</head>

<body>

<div class="container">

<div class="hero">
  <img src="logo.png" alt="ElevateCV Logo">
  <p>Transform Your Resume Into A Stunning Portfolio</p>
</div>

<div class="card">

<input type="file" id="file" accept=".pdf,.doc,.docx,.txt">

<select id="template">
<option value="Modern Minimal">Modern Minimal</option>
<option value="Executive Blue">Executive Blue</option>
<option value="Academic Green">Academic Green</option>
</select>

<input type="text" id="role" placeholder="Target Role">
<textarea id="notes" placeholder="Additional notes"></textarea>

<button onclick="generate()">Generate</button>
<button id="htmlBtn" onclick="downloadHTML()" disabled>Download HTML</button>
<button id="pdfBtn" onclick="downloadPDF()" disabled>Download PDF</button>

<div class="loader" id="loader">Generating portfolio...</div>

</div>

<div class="card">
<iframe id="preview"></iframe>
</div>

</div>

<script>

let generatedHTML="";

function cleanHTML(raw){
  return raw.replace(/```html/g,"").replace(/```/g,"").trim();
}

function toBase64(file){
  return new Promise((resolve,reject)=>{
    const reader=new FileReader();
    reader.readAsDataURL(file);
    reader.onload=()=>resolve(reader.result.split(',')[1]);
    reader.onerror=reject;
  });
}

async function generate(){
  const file=document.getElementById("file").files[0];
  if(!file){alert("Upload resume");return;}

  document.getElementById("loader").style.display="block";

  const base64=await toBase64(file);

  const response=await fetch("/api/generate",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({
      fileBase64:base64,
      mimeType:file.type,
      role:document.getElementById("role").value,
      notes:document.getElementById("notes").value,
      template:document.getElementById("template").value
    })
  });

  const data=await response.json();
  document.getElementById("loader").style.display="none";

  if(!response.ok){alert(data.error);return;}

  generatedHTML=cleanHTML(data.text);
  document.getElementById("preview").srcdoc=generatedHTML;

  document.getElementById("htmlBtn").disabled=false;
  document.getElementById("pdfBtn").disabled=false;
}

function downloadHTML(){
  const blob=new Blob([generatedHTML],{type:"text/html"});
  const a=document.createElement("a");
  a.href=URL.createObjectURL(blob);
  a.download="portfolio.html";
  a.click();
}

function downloadPDF(){
  const wrapper=document.createElement("div");
  wrapper.style.margin="0";
  wrapper.style.padding="0";
  wrapper.style.width="210mm";
  wrapper.innerHTML=generatedHTML;

  html2pdf().set({
    margin:0,
    filename:"portfolio.pdf",
    image:{type:"jpeg",quality:0.98},
    html2canvas:{scale:2,useCORS:true,scrollY:0},
    jsPDF:{unit:"mm",format:"a4",orientation:"portrait"}
  }).from(wrapper).save();
}

</script>

</body>
</html>
