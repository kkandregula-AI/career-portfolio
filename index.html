<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>PortfolioAI Pro</title>

<style>
body{
  font-family:system-ui;
  margin:0;
  background:#faf8f4;
  transition:.3s;
}
.dark{
  background:#111;
  color:white;
}
.container{
  max-width:1100px;
  margin:auto;
  padding:30px;
}
.card{
  background:white;
  padding:20px;
  border-radius:12px;
  margin-bottom:20px;
}
.dark .card{background:#1c1c1c}
button{
  padding:10px 15px;
  margin-right:10px;
  cursor:pointer;
}
.loader{
  display:none;
  margin-top:15px;
}
.spinner{
  width:30px;
  height:30px;
  border:4px solid #ccc;
  border-top:4px solid black;
  border-radius:50%;
  animation:spin 1s linear infinite;
}
@keyframes spin{to{transform:rotate(360deg)}}
iframe{width:100%;height:600px;border:none;background:white}
</style>
</head>

<body>

<div class="container">

<h2>PortfolioAI Pro</h2>

<div class="card">

<input type="file" id="file" accept=".pdf,.doc,.docx,.txt"><br><br>

<select id="template">
<option value="Modern Minimal">Modern Minimal</option>
<option value="Executive Blue">Executive Blue</option>
<option value="Academic Green">Academic Green</option>
</select><br><br>

<input type="text" id="role" placeholder="Target Role"><br><br>
<textarea id="notes" placeholder="Extra notes"></textarea><br><br>

<button onclick="generate()">Generate</button>
<button onclick="toggleDark()">Toggle Dark</button>

<div class="loader" id="loader">
<div class="spinner"></div>
<p>Generating portfolio...</p>
</div>

</div>

<div class="card">
<iframe id="preview"></iframe>
</div>

</div>

<script>

function toggleDark(){
  document.body.classList.toggle("dark");
}

async function toBase64(file){
  return new Promise((resolve,reject)=>{
    const reader=new FileReader();
    reader.readAsDataURL(file);
    reader.onload=()=>resolve(reader.result.split(',')[1]);
    reader.onerror=reject;
  });
}

async function generate(){
  const file=document.getElementById("file").files[0];
  if(!file){ alert("Upload resume"); return; }

  document.getElementById("loader").style.display="block";

  const base64=await toBase64(file);

  const response=await fetch("/api/generate",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({
      fileBase64:base64,
      mimeType:file.type,
      role:document.getElementById("role").value,
      notes:document.getElementById("notes").value,
      template:document.getElementById("template").value
    })
  });

  const data=await response.json();

  document.getElementById("loader").style.display="none";

  if(!response.ok){
    alert(data.error);
    return;
  }

  document.getElementById("preview").srcdoc=data.text;
}

</script>

</body>
</html>
